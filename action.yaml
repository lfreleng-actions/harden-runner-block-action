---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: "🛡️ Harden Runner: Block-mode Allow-list Loader"
description: >
  Loads an allowed-endpoints egress allow-list from a local file or
  remote URL (with sensible defaults), sanitises it, and publishes it
  as an environment variable that a subsequent step-security/harden-runner
  step can consume in 'block' egress mode.

# Notes:
#   - A local file path (input: allow_list_path) always takes precedence
#     over both the 'url' and 'org' inputs.
#   - When 'allow_list_path' is empty and 'url' is empty, the action
#     constructs the default URL from the resolved org as:
#       https://raw.githubusercontent.com/<ORG>/.github/HEAD/\
#         .github/harden-runner/<ORG>/allow_list.txt
#   - The action sanitises allow-list content against a strict allow-list
#     character set before exporting, to avoid passing shell metacharacters
#     / injection vectors through the workflow environment.
#   - The action's loading work happens in the 'pre:' lifecycle hook so
#     that the published env var (default CONNECTION_ALLOW_LIST) exists
#     before any later action's pre hook runs. That ordering is the
#     reason this is a Node.js action with a pre hook rather than a
#     composite action: step-security/harden-runner's own pre hook
#     reads allowed-endpoints and configures the network filter before
#     any main step executes.

inputs:
  allow_list_path:
    description: >
      Local filesystem path to an allow-list file. When supplied, the
      action ignores the 'url' and 'org' inputs. The file must contain
      a list of host[:port] entries separated by whitespace (single
      or multi-line accepted; '#' introduces a comment, either as a
      full-line comment or trailing on a line). Must not contain
      newline characters in the path string itself.
    required: false
    default: ""
  url:
    description: >
      Remote URL from which to download the allow-list file. Ignored
      when 'allow_list_path' is supplied. When neither
      'allow_list_path' nor 'url' is provided, the action constructs
      a default URL using the 'org' input. Must not contain newline
      characters.
    required: false
    default: ""
  org:
    description: >
      GitHub organisation/owner used to construct the default
      allow-list URL. When omitted, defaults at runtime to the current
      repository owner (github.repository_owner). Ignored when
      'allow_list_path' is set or 'url' is supplied explicitly.
    required: false
    default: ""
  env_var_name:
    description: >
      Name of the environment variable to publish to subsequent steps.
      Must match ^[A-Z_][A-Z0-9_]*$ (uppercase letters, digits,
      underscores; cannot start with a digit).
    required: false
    default: "CONNECTION_ALLOW_LIST"
  config:
    description: >
      GitHub-Actions 'uses:'-style coordinate identifying a remote
      allow-list file, fetched with a shallow, ref-pinned git fetch
      (branch, tag or commit SHA). Mutually exclusive with the
      'path', 'url' and 'org' inputs; supplying any of them together
      with 'config' is an error. See the README for the full grammar.
      Examples:
        lfreleng-actions@main
        lfit@v1.1.0
        lfit//custom_list.txt@v1.1.0
        lfit//@<sha>
    required: false
    default: ""
  token:
    description: >
      Token used to authenticate the git fetch when 'config' targets
      a private host repository. Leave empty for public repositories.
      GITHUB_TOKEN only grants access to the current repository;
      reading a private config repo in another org needs a PAT or
      GitHub App token with contents:read on that repo.
    required: false
    default: ""
  allow_list_summary:
    description: >
      Whether to write the allow-list/config block to the job step
      summary. Set to 'false' to suppress it. Useful for matrix jobs,
      where the same block would otherwise repeat once per leg; emit
      it on a single leg with, e.g.,
      allow_list_summary: ${{ strategy.job-index == 0 }}.
    required: false
    default: "true"

outputs:
  allowed_endpoints:
    description: >
      The sanitised, space-separated allowed-endpoints allow-list
      string.
  source:
    description: >
      The source from which the action loaded the allow-list: 'path',
      'url' or 'default-url'.
  resolved_url:
    description: >
      When the action fetched the allow-list from a URL, the URL that
      it used. Empty when the source was a local 'path'.
  resolved_host_org:
    description: >
      Host org the allow-list was fetched from (config mode).
  resolved_repo:
    description: >
      Repository the allow-list was fetched from (config mode).
  resolved_ref:
    description: >
      Git ref requested for the config fetch (config mode).
  resolved_sha:
    description: >
      Exact commit SHA the config ref resolved to (config mode).
  resolved_path:
    description: >
      In-repo path of the matched config file (config mode).
  matched_candidate:
    description: >
      Which search candidate matched: org-specific, family-default or
      explicit (config mode).

runs:
  using: "node24"
  pre: "src/pre.mjs"
  main: "src/main.mjs"
