---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow.
#
# The GitHub Actions runner does NOT execute an action's pre: hook
# when the action is referenced as a local action (`uses: ./`); only
# main runs. The runner emits a warning to that effect. All of this
# action's load + sanitise + exportVariable logic lives in pre.mjs,
# so a `uses: ./` self-test would silently skip the real code path.
#
# These tests therefore invoke `node src/pre.mjs` directly, with the
# inputs supplied via the documented INPUT_* env-var protocol and
# the runner outputs (GITHUB_ENV / GITHUB_OUTPUT / GITHUB_STEP_SUMMARY)
# redirected to temporary files. Asserts on exit code and on the
# captured env/output files give us the same coverage we would have
# wanted from a self-`uses: ./` integration test, without the local-
# action pre limitation.
#
# End-to-end integration with step-security/harden-runner — where
# the action runs by full owner/repo@ref reference, the pre: hook
# actually fires, and a sibling harden-runner step consumes the
# published env var in block mode — lives in
# .github/workflows/integration.yaml. That workflow triggers on
# push to main (i.e. after merge) so it can reference the
# just-merged action by its public ref.

name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Happy path: valid local allow-list file. Asserts the action
  ### exits 0, writes the env var, writes outputs, and that the
  ### published value is the sanitised whitespace-collapsed list.
  test-happy-path-local-file:
    name: "Happy path: local file"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Stage local allow-list file"
        id: stage
        shell: bash
        run: |
          # Stage local allow-list file
          set -euo pipefail
          al_file="${RUNNER_TEMP}/local-allow-list.txt"
          cat > "$al_file" <<'EOF'
          # Test allow-list (multi-line, comments allowed)
          github.com:443
          api.github.com:443
          *.githubusercontent.com:443  # inline comment
          objects.githubusercontent.com:443
          EOF
          echo "al_file=$al_file" >> "$GITHUB_OUTPUT"

      - name: "Run pre.mjs (action under test)"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ${{ steps.stage.outputs.al_file }}
          INPUT_URL: ""
          INPUT_ORG: ""
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs (action under test)
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env"
          : > "$captured_out"
          : > "$captured_sum"
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs

          echo "::group::Captured GITHUB_ENV"
          cat "$captured_env"
          echo "::endgroup::"
          echo "::group::Captured GITHUB_OUTPUT"
          cat "$captured_out"
          echo "::endgroup::"

          # Assertions.
          if ! grep -q '^CONNECTION_ALLOW_LIST=github\.com:443 ' \
                 "$captured_env"; then
            echo "Error: CONNECTION_ALLOW_LIST missing or wrong ❌"
            exit 1
          fi
          if ! grep -q 'objects\.githubusercontent\.com:443' \
                 "$captured_env"; then
            echo "Error: last entry missing from env ❌"
            exit 1
          fi
          if ! grep -q '^source=path$' "$captured_out"; then
            echo "Error: source output != path ❌"
            exit 1
          fi
          if ! grep -q '^resolved_url=$' "$captured_out"; then
            echo "Error: resolved_url not empty for path source ❌"
            exit 1
          fi
          # Inline comments must be stripped.
          if grep -q 'inline comment' "$captured_env"; then
            echo "Error: inline '#' comment leaked into env ❌"
            exit 1
          fi
          echo "Happy-path local-file assertions passed ✅"

  ### Happy path: URL fetch via the default URL constructor. Confirms
  ### the action can reach raw.githubusercontent.com and that the
  ### sanitiser accepts a real-world allow-list.
  test-happy-path-default-url:
    name: "Happy path: default URL"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs against the default URL"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ""
          INPUT_URL: ""
          INPUT_ORG: "lfreleng-actions"
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs against the default URL
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs

          if ! grep -q '^source=default-url$' "$captured_out"; then
            echo "Error: source output != default-url ❌"
            exit 1
          fi
          # The expected resolved_url is long; split the literal
          # across two shell variables so the line stays <80 cols.
          want_url_a="^resolved_url=https://raw.githubusercontent.com"
          want_url_b="/lfreleng-actions/.github/HEAD/"
          want_url_c=".github/harden-runner/lfreleng-actions/allow_list.txt$"
          want_url="${want_url_a}${want_url_b}${want_url_c}"
          if ! grep -Eq "$want_url" "$captured_out"; then
            echo "Error: resolved_url wrong ❌"
            cat "$captured_out"
            exit 1
          fi
          # Env var should carry a non-trivial number of endpoints.
          # Use wc -w (word count): wc -l would undercount by 1 when
          # the captured value has no trailing newline.
          count=$(grep '^CONNECTION_ALLOW_LIST=' "$captured_env" \
            | sed 's/^CONNECTION_ALLOW_LIST=//' | wc -w | tr -d ' ')
          if [ "$count" -lt 10 ]; then
            echo "Error: expected >=10 endpoints, got $count ❌"
            exit 1
          fi
          echo "Happy-path default-URL assertions passed ($count endpoints) ✅"

  ### Config mode (Node→Python integration). Asserts that pre.mjs
  ### invokes the shared resolver, fetches the live allow-list via
  ### git, publishes the env var, and emits the resolved_* outputs
  ### (notably the peeled commit resolved_sha).
  test-config-mode:
    name: "Config mode: git fetch"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs in config mode"
        shell: bash
        env:
          # Pinned to an immutable commit SHA so the assertions below
          # do not depend on the mutable contents of
          # lfreleng-actions/.github@main.
          # yamllint disable-line rule:line-length
          INPUT_CONFIG: "lfreleng-actions@9e51be0a6ca2c2ce11d418e87b4a425d86a329fa"
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
          GITHUB_REPOSITORY_OWNER: "lfreleng-actions"
        run: |
          # Run pre.mjs in config mode (exercises the Python resolver)
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/cfg_env"
          captured_out="${RUNNER_TEMP}/cfg_out"
          captured_sum="${RUNNER_TEMP}/cfg_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs

          if ! grep -q '^source=config$' "$captured_out"; then
            echo "Error: source output != config ❌"
            cat "$captured_out"
            exit 1
          fi
          if ! grep -q '^found=true$' "$captured_out"; then
            echo "Error: found output != true ❌"
            exit 1
          fi
          # resolved_sha must be a 40-char commit SHA (peeled, not a
          # tag object): proves the Node→Python wiring populated it.
          if ! grep -Eq '^resolved_sha=[0-9a-f]{40}$' "$captured_out"; then
            echo "Error: resolved_sha not a 40-char commit SHA ❌"
            cat "$captured_out"
            exit 1
          fi
          # Declared outputs must use the resolved_* names.
          for key in resolved_host_org resolved_repo resolved_ref; do
            if ! grep -q "^${key}=" "$captured_out"; then
              echo "Error: missing output ${key} ❌"
              exit 1
            fi
          done
          count=$(grep '^CONNECTION_ALLOW_LIST=' "$captured_env" \
            | sed 's/^CONNECTION_ALLOW_LIST=//' | wc -w | tr -d ' ')
          if [ "$count" -lt 10 ]; then
            echo "Error: expected >=10 endpoints, got $count ❌"
            exit 1
          fi
          echo "Config-mode assertions passed ($count endpoints) ✅"

  ### Config mutual-exclusion. Asserts that combining 'config' with a
  ### legacy source input (org) fails fast with a clear error, so the
  ### precedence rule cannot silently regress.
  test-config-exclusivity:
    name: "Config mode: mutual exclusion"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs with config + org (must fail)"
        shell: bash
        env:
          INPUT_CONFIG: "lfreleng-actions@main"
          INPUT_ORG: "lfreleng-actions"
          GITHUB_REPOSITORY_OWNER: "lfreleng-actions"
        run: |
          # config combined with a legacy source input must error
          set -uo pipefail
          captured_env="${RUNNER_TEMP}/exc_env"
          captured_out="${RUNNER_TEMP}/exc_out"
          : > "$captured_env" ; : > "$captured_out"
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
            node src/pre.mjs 2> "${RUNNER_TEMP}/exc_err"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Error: expected non-zero exit for config+org ❌"
            exit 1
          fi
          if ! grep -q 'mutually exclusive' "${RUNNER_TEMP}/exc_err"; then
            echo "Error: missing mutual-exclusion error message ❌"
            cat "${RUNNER_TEMP}/exc_err"
            exit 1
          fi
          echo "Config mutual-exclusion assertion passed (exit ${rc}) ✅"

  ### Custom env var name. Asserts that pre.mjs publishes to the
  ### requested env var and NOT to the default name.
  test-custom-env-var:
    name: "Custom env_var_name"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs with custom env_var_name"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ""
          INPUT_URL: ""
          INPUT_ORG: "lfreleng-actions"
          INPUT_ENV_VAR_NAME: "MY_ALLOW_LIST"
        run: |
          # Run pre.mjs with custom env_var_name
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs

          if ! grep -q '^MY_ALLOW_LIST=' "$captured_env"; then
            echo "Error: MY_ALLOW_LIST not published ❌"
            exit 1
          fi
          if grep -q '^CONNECTION_ALLOW_LIST=' "$captured_env"; then
            echo "Error: default CONNECTION_ALLOW_LIST unexpectedly published ❌"
            exit 1
          fi
          echo "Custom env_var_name assertions passed ✅"

  ### Failure: shell metacharacter token. Asserts the action exits
  ### non-zero and does NOT publish a partial allow-list.
  test-rejects-bad-input:
    name: "Rejects shell metacharacters"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Stage malicious allow-list file"
        id: stage
        shell: bash
        run: |
          # Stage malicious allow-list file
          set -euo pipefail
          al_file="${RUNNER_TEMP}/bad-allow-list.txt"
          # shellcheck disable=SC2016
          printf '%s\n' 'github.com:443 evil.com:443;`whoami`' > "$al_file"
          echo "al_file=$al_file" >> "$GITHUB_OUTPUT"

      - name: "Run pre.mjs against malicious file"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ${{ steps.stage.outputs.al_file }}
          INPUT_URL: ""
          INPUT_ORG: ""
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs against malicious file
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Error: pre.mjs accepted malicious token (exit 0) ❌"
            cat "$captured_env"
            exit 1
          fi
          # Must NOT publish the env var when the sanitiser rejects.
          if grep -q '^CONNECTION_ALLOW_LIST=' "$captured_env"; then
            echo "Error: env var published despite failure ❌"
            exit 1
          fi
          echo "Sanitiser correctly rejected metacharacters (exit $rc) ✅"

  ### Failure: port out of range. Asserts the action rejects tokens
  ### whose port survives the regex but is not a real TCP/UDP port.
  test-rejects-bad-port:
    name: "Rejects port out of range"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Stage allow-list with bad port"
        id: stage
        shell: bash
        run: |
          # Stage allow-list with bad port
          set -euo pipefail
          al_file="${RUNNER_TEMP}/badport-allow-list.txt"
          echo 'evil.com:99999' > "$al_file"
          echo "al_file=$al_file" >> "$GITHUB_OUTPUT"

      - name: "Run pre.mjs against bad-port file"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ${{ steps.stage.outputs.al_file }}
          INPUT_URL: ""
          INPUT_ORG: ""
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs against bad-port file
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Error: pre.mjs accepted out-of-range port (exit 0) ❌"
            exit 1
          fi
          echo "Sanitiser correctly rejected port 99999 (exit $rc) ✅"

  ### Failure: missing file. Asserts the action exits non-zero when
  ### given a path that does not exist.
  test-rejects-missing-file:
    name: "Rejects missing file"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs against missing file"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: "/tmp/does-not-exist-9f3a2b.txt"
          INPUT_URL: ""
          INPUT_ORG: ""
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs against missing file
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Error: pre.mjs accepted missing file (exit 0) ❌"
            exit 1
          fi
          echo "Sanitiser correctly rejected missing file (exit $rc) ✅"

  ### Failure: invalid env_var_name (lowercase). Asserts the regex
  ### gate fires before any file/network work.
  test-rejects-invalid-env-var-name:
    name: "Rejects invalid env_var_name"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs with lowercase env_var_name"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ""
          INPUT_URL: ""
          INPUT_ORG: "lfreleng-actions"
          INPUT_ENV_VAR_NAME: "lowercase_var"
        run: |
          # Run pre.mjs with lowercase env_var_name
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Error: pre.mjs accepted invalid env_var_name (exit 0) ❌"
            exit 1
          fi
          echo "Invalid env_var_name correctly rejected (exit $rc) ✅"

  ### Failure: newline in path input. Asserts the injection guard
  ### fires.
  test-rejects-newline-in-path:
    name: "Rejects newline in path input"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs with newline in path"
        shell: bash
        # Use a multi-line literal so the path input actually
        # contains a newline character.
        env:
          INPUT_ALLOW_LIST_PATH: |
            /tmp/innocent
            INJECTED=evil
          INPUT_URL: ""
          INPUT_ORG: ""
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs with newline in path
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Error: pre.mjs accepted newline in path (exit 0) ❌"
            exit 1
          fi
          if grep -q '^INJECTED=' "$captured_env"; then
            echo "Error: env injection succeeded ❌"
            exit 1
          fi
          echo "Newline-in-path correctly rejected (exit $rc) ✅"

  ### Redaction: URL credentials, query string, and fragment must not
  ### leak into the captured $GITHUB_OUTPUT or $GITHUB_STEP_SUMMARY
  ### when the user supplies a URL containing any of those. The
  ### actual fetch will probably 404 (we point at the canonical
  ### lfreleng-actions allow-list with fake credentials), but the
  ### test is only interested in what gets recorded BEFORE / DURING
  ### the fetch attempt.
  test-redacts-url-credentials:
    name: "Redacts URL credentials / query / fragment"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run pre.mjs against a credential-bearing URL"
        shell: bash
        env:
          INPUT_ALLOW_LIST_PATH: ""
          # yamllint disable-line rule:line-length
          INPUT_URL: "https://leak-user:leak-pass@raw.githubusercontent.com/lfreleng-actions/.github/HEAD/.github/harden-runner/lfreleng-actions/allow_list.txt?token=topsecret#frag"
          INPUT_ORG: ""
          INPUT_ENV_VAR_NAME: "CONNECTION_ALLOW_LIST"
        run: |
          # Run pre.mjs against a credential-bearing URL
          set -euo pipefail
          captured_env="${RUNNER_TEMP}/captured_env"
          captured_out="${RUNNER_TEMP}/captured_out"
          captured_sum="${RUNNER_TEMP}/captured_sum"
          captured_stdout="${RUNNER_TEMP}/captured_stdout"
          captured_stderr="${RUNNER_TEMP}/captured_stderr"
          : > "$captured_env" ; : > "$captured_out" ; : > "$captured_sum"
          : > "$captured_stdout" ; : > "$captured_stderr"
          # The fetch will likely fail (HTTP 401 / 404), which is
          # fine: the test inspects what got written to the
          # GITHUB_* files BEFORE the failure terminates the
          # script. We allow either exit code.
          set +e
          GITHUB_ENV="$captured_env" \
          GITHUB_OUTPUT="$captured_out" \
          GITHUB_STEP_SUMMARY="$captured_sum" \
            node src/pre.mjs > "$captured_stdout" 2> "$captured_stderr"
          rc=$?
          set -e
          echo "pre.mjs exit code: $rc"
          echo "::group::stdout (workflow commands)"
          cat "$captured_stdout"
          echo "::endgroup::"
          echo "::group::captured GITHUB_OUTPUT"
          cat "$captured_out"
          echo "::endgroup::"
          echo "::group::captured GITHUB_STEP_SUMMARY"
          cat "$captured_sum"
          echo "::endgroup::"

          # The captured GITHUB_OUTPUT and GITHUB_STEP_SUMMARY must
          # not contain any of the secret components. The error
          # annotation channel (stdout '::error::') is also part of
          # what the runner shows users, so we check it too. (We
          # do not check captured_stderr: stderr is not parsed by
          # the runner as workflow commands and is generally only
          # visible in raw logs to a workflow author.)
          leaks=0
          for needle in 'leak-user' 'leak-pass' 'token=topsecret' '#frag'; do
            for file in "$captured_out" "$captured_sum" "$captured_stdout"; do
              if grep -F -q "$needle" "$file"; then
                echo "❌ LEAK: '$needle' found in $(basename "$file")"
                leaks=$((leaks + 1))
              fi
            done
          done
          if [ "$leaks" -ne 0 ]; then
            echo "$leaks leak(s) detected ❌"
            exit 1
          fi
          # Positive assertion: the redacted form (scheme + host +
          # path) MUST appear in the captured stdout (which includes
          # the 'Source: ...' info line and the '::error::' annotation
          # that surfaces the fetch failure) so users can still see
          # which endpoint the action tried to reach. The action
          # exits non-zero before writing step outputs when the
          # fetch fails, so we cannot assert on captured_out here.
          expected_url="https://raw.githubusercontent.com/lfreleng-actions/.github/HEAD/.github/harden-runner/lfreleng-actions/allow_list.txt"
          if ! grep -F -q "$expected_url" "$captured_stdout"; then
            echo "Error: expected redacted URL not found in stdout ❌"
            exit 1
          fi
          echo "URL redaction validated ✅"

  ### Format equivalence: proves the ingress file layout does not
  ### change what the action publishes. The same endpoints are staged
  ### twice -- once as the legacy single, space-separated line, once as
  ### the new one-per-line file with header, full-line and inline '#'
  ### comments -- and the two published env-var values must be
  ### byte-identical. This is the production safety net for
  ### lfreleng-actions/.github#99: reformatting allow_list.txt must not
  ### perturb the allowed-endpoints list harden-runner enforces.
  test-format-equivalence:
    name: "Format equivalence: single-line vs multi-line"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Stage single-line and multi-line allow-list fixtures"
        id: stage
        shell: bash
        run: |
          # Stage both fixtures with the SAME endpoints in the SAME
          # order (the sanitiser preserves order, so the published
          # strings can only match if the layouts are truly equivalent).
          set -euo pipefail
          single="${RUNNER_TEMP}/single-line.txt"
          multi="${RUNNER_TEMP}/multi-line.txt"

          # Legacy format: one long, space-separated line. Build it
          # from short args so no source line exceeds the length limit;
          # the '%s ' template yields a single space-separated line.
          printf '%s ' \
            'github.com:443' \
            'api.github.com:443' \
            '*.githubusercontent.com:443' \
            'azure.archive.ubuntu.com:80' \
            'gerrit.o-ran-sc.org:29418' \
            'astral.sh' > "$single"
          printf '\n' >> "$single"

          # New format: one host[:port] per line, with a header block,
          # a full-line rationale comment and inline '#' comments.
          cat > "$multi" <<'EOF'
          # SPDX-License-Identifier: Apache-2.0
          # egress allow-list (one host[:port] per line)

          github.com:443
          # GitHub REST API
          api.github.com:443
          *.githubusercontent.com:443  # subdomain wildcard
          azure.archive.ubuntu.com:80
          gerrit.o-ran-sc.org:29418	# gerrit SSH (tab before comment)
          astral.sh
          EOF

          echo "single=$single" >> "$GITHUB_OUTPUT"
          echo "multi=$multi" >> "$GITHUB_OUTPUT"

      - name: "Run pre.mjs on both fixtures and diff the output"
        shell: bash
        env:
          SINGLE_FILE: ${{ steps.stage.outputs.single }}
          MULTI_FILE: ${{ steps.stage.outputs.multi }}
        run: |
          # Run pre.mjs on both fixtures and diff the output
          set -euo pipefail

          run_and_capture() {
            # $1 = allow-list path; echoes the published env-var value.
            local path="$1"
            local env_file
            env_file="$(mktemp "${RUNNER_TEMP}/env.XXXXXX")"
            INPUT_ALLOW_LIST_PATH="$path" \
            INPUT_URL="" \
            INPUT_ORG="" \
            INPUT_ENV_VAR_NAME="CONNECTION_ALLOW_LIST" \
            GITHUB_ENV="$env_file" \
            GITHUB_OUTPUT="$(mktemp "${RUNNER_TEMP}/out.XXXXXX")" \
            GITHUB_STEP_SUMMARY="$(mktemp "${RUNNER_TEMP}/sum.XXXXXX")" \
              node src/pre.mjs >/dev/null
            sed -n 's/^CONNECTION_ALLOW_LIST=//p' "$env_file"
          }

          single_value="$(run_and_capture "$SINGLE_FILE")"
          multi_value="$(run_and_capture "$MULTI_FILE")"

          echo "::group::Published values"
          echo "single-line: $single_value"
          echo "multi-line : $multi_value"
          echo "::endgroup::"

          if [ -z "$single_value" ]; then
            echo "Error: single-line fixture published no value ❌"
            exit 1
          fi
          if [ "$single_value" != "$multi_value" ]; then
            echo "Error: output differs between file formats ❌"
            diff <(printf '%s\n' "$single_value") \
                 <(printf '%s\n' "$multi_value") || true
            exit 1
          fi
          # Comments must never leak into the published list.
          for leaked in 'subdomain' 'wildcard' 'gerrit SSH' 'REST' '#'; do
            if printf '%s' "$multi_value" | grep -F -q "$leaked"; then
              echo "Error: comment text '$leaked' leaked into output ❌"
              exit 1
            fi
          done
          count=$(printf '%s' "$single_value" | wc -w | tr -d ' ')
          echo "Both formats published an identical $count-endpoint list ✅"
